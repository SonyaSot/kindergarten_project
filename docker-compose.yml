services:
  db:
    image: postgres:15
    container_name: kindergarten_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: kindergarten_db
      TZ: Europe/Moscow              
      PGTZ: Europe/Moscow
    volumes:
      - postgres_data:/var/lib/postgresql/data  # ← Тире + пробел + имя:путь
    ports:
      - "5432:5432"
    networks:
      - kindergarten_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: kindergarten_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/kindergarten_db
      SECRET_KEY: your-secret-key-here-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kindergarten_network
    volumes:
      - .:/app

volumes:
  postgres_data:  # ← Объявление тома (имя без тире)

networks:
  kindergarten_network:
    driver: bridge